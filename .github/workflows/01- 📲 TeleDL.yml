name: 01- 📲 TeleDL
on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram post/file link'
        required: true
        type: string
      password:
        description: '🔐 Password for archive (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: 📂 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: ⚙️ Configure Git for large files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "✅ Git configured for large file handling"

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq openssl bc p7zip-full python3

          echo "✅ Dependencies installed"
          echo ""
          echo "Tool versions:"
          curl --version | head -1
          jq --version
          7z i 2>/dev/null | head -2

      - name: 🔍 Resolve Telegram download link
        id: resolve
        run: |
          TELEGRAM_LINK="${{ github.event.inputs.telegram_link }}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "🔗 Input link: $TELEGRAM_LINK"
          echo "═══════════════════════════════════════════════════════════════"

          # ─── Method 1: telegramdownloader.net API ───────────────────────
          echo ""
          echo "🌐 Method 1: Trying telegramdownloader.net..."

          RESPONSE=$(curl -s --max-time 30 -X POST \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "telegram_link=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$TELEGRAM_LINK")" \
            https://telegramdownloader.net/proxy.php 2>/dev/null || echo "FAILED")

          RAW_URL=""
          FILE_NAME=""

          if [ "$RESPONSE" != "FAILED" ] && [ -n "$RESPONSE" ]; then
            RAW_URL=$(echo "$RESPONSE" | jq -r '.data.data.link // empty' 2>/dev/null)
            FILE_NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name // empty' 2>/dev/null)
          fi

          # ─── Method 2: tgsave style scraper ─────────────────────────────
          if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
            echo "⚠️  Method 1 failed. Trying Method 2: tgsave.com..."

            RESPONSE2=$(curl -s --max-time 30 -X POST \
              -H "User-Agent: Mozilla/5.0" \
              -H "Content-Type: application/json" \
              -d "{\"url\":\"$TELEGRAM_LINK\"}" \
              https://api.tgsave.com/download 2>/dev/null || echo "FAILED")

            if [ "$RESPONSE2" != "FAILED" ] && [ -n "$RESPONSE2" ]; then
              RAW_URL=$(echo "$RESPONSE2" | jq -r '.url // .link // .download_url // empty' 2>/dev/null)
              FILE_NAME=$(echo "$RESPONSE2" | jq -r '.filename // .file_name // .name // empty' 2>/dev/null)
            fi
          fi

          # ─── Method 3: Direct CDN link detection ────────────────────────
          if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
            echo "⚠️  Method 2 failed. Trying Method 3: Direct CDN detection..."

            PAGE_HTML=$(curl -sL --max-time 20 \
              -H "User-Agent: TelegramBot (like TwitterBot)" \
              "$TELEGRAM_LINK" 2>/dev/null || echo "")

            RAW_URL=$(echo "$PAGE_HTML" | grep -oP 'https://cdn[0-9]*\.telesco\.pe/file/[^"]+' | head -1 || echo "")

            if [ -z "$RAW_URL" ]; then
              RAW_URL=$(echo "$PAGE_HTML" | grep -oP '(?<=content=")[^"]+\.(mp4|mov|avi|mkv|pdf|zip|rar|7z|jpg|jpeg|png|gif|mp3|m4a|wav|flac)[^"]*' | head -1 || echo "")
            fi

            if [ -n "$RAW_URL" ]; then
              FILE_NAME=$(basename "$RAW_URL" | sed 's/[?#].*//')
              echo "✅ Found CDN link via page scrape"
            fi
          fi

          # ─── Final validation ────────────────────────────────────────────
          if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
            echo ""
            echo "❌ ERROR: Could not resolve a download link from: $TELEGRAM_LINK"
            echo ""
            echo "Troubleshooting tips:"
            echo "  • Make sure the post/channel is PUBLIC"
            echo "  • Use the direct post link format: https://t.me/channelname/123"
            echo "  • Private channels are not supported"
            exit 1
          fi

          # ─── Encode non-ASCII chars in URL path (keep query string intact) ─
          ENCODED_URL=$(python3 -c "
          import sys, urllib.parse

          url = sys.argv[1]

          if '?' in url:
              path_part, rest = url.split('?', 1)
              rest = '?' + rest
          elif '#' in url:
              path_part, rest = url.split('#', 1)
              rest = '#' + rest
          else:
              path_part, rest = url, ''

          encoded_path = urllib.parse.quote(path_part, safe=':/@.-_~!\$&()*+,;=')

          print(encoded_path + rest)
          " "$RAW_URL")

          # ─── Extract clean filename from URL (strip query/fragment first) ─
          if [ -z "$FILE_NAME" ] || [ "$FILE_NAME" = "null" ]; then
            RAW_PATH=$(python3 -c "
          import sys, urllib.parse
          url = sys.argv[1].split('?')[0].split('#')[0]
          name = urllib.parse.unquote(url.split('/')[-1])
          print(name)
          " "$RAW_URL")
            FILE_NAME="$RAW_PATH"
            [ -z "$FILE_NAME" ] && FILE_NAME="telegram_file_$(date +%s)"
          else
            # API gave us a filename — still strip any stray query params
            FILE_NAME=$(echo "$FILE_NAME" | sed 's/[?#].*//')
          fi

          echo ""
          echo "✅ Link resolved successfully!"
          echo "📄 Filename   : $FILE_NAME"
          echo "🔗 Direct URL : $ENCODED_URL"

          echo "download_url=$ENCODED_URL" >> $GITHUB_OUTPUT
          echo "original_name=$FILE_NAME"  >> $GITHUB_OUTPUT

      - name: ⬇️ Download file
        id: download
        run: |
          URL="${{ steps.resolve.outputs.download_url }}"
          ORIGINAL_NAME="${{ steps.resolve.outputs.original_name }}"

          sanitize_name() {
            echo "$1" \
              | iconv -f utf-8 -t ascii//TRANSLIT 2>/dev/null \
              | sed 's/ /-/g' | sed 's/　/-/g' \
              | sed 's/[^a-zA-Z0-9._-]/_/g' \
              | sed 's/__*/_/g' \
              | sed 's/^[._-]*//' \
              | tr -s '-'
          }

          SAFE_NAME=$(sanitize_name "$ORIGINAL_NAME")
          [ -z "$SAFE_NAME" ] && SAFE_NAME="telegram_file_$(date +%s).bin"

          BACKUP_DIR="/tmp/tg_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          mkdir -p tmp_downloads

          BASE_NAME="${SAFE_NAME%.*}"
          EXT="${SAFE_NAME##*.}"
          [ "$EXT" = "$SAFE_NAME" ] && EXT="bin"

          FINAL_NAME="$SAFE_NAME"
          COUNTER=1
          while [ -f "tmp_downloads/$FINAL_NAME" ]; do
            FINAL_NAME="${BASE_NAME}_${COUNTER}.${EXT}"
            COUNTER=$((COUNTER + 1))
          done

          echo "═══════════════════════════════════════════════════════════════"
          echo "⬇️  Downloading : $FINAL_NAME"
          echo "🔗 From        : $URL"
          echo "═══════════════════════════════════════════════════════════════"

          CURL_COMMON_ARGS=(
            -L
            --progress-bar
            --max-time 7200
            --retry 5
            --retry-delay 10
            --retry-max-time 3600
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
            -H "Referer: https://t.me/"
            -o "tmp_downloads/$FINAL_NAME"
          )

          DOWNLOAD_OK=false

          # Attempt 1: default (HTTP/2)
          echo "🔄 Attempt 1/3 — HTTP/2 (default)..."
          if curl "${CURL_COMMON_ARGS[@]}" "$URL"; then
            DOWNLOAD_OK=true
          else
            echo "⚠️  HTTP/2 failed (exit $?), trying HTTP/1.1..."
            rm -f "tmp_downloads/$FINAL_NAME"

            # Attempt 2: force HTTP/1.1 — fixes curl error 92 (stream INTERNAL_ERROR)
            echo "🔄 Attempt 2/3 — HTTP/1.1..."
            if curl "${CURL_COMMON_ARGS[@]}" --http1.1 "$URL"; then
              DOWNLOAD_OK=true
            else
              echo "⚠️  HTTP/1.1 also failed (exit $?), trying wget fallback..."
              rm -f "tmp_downloads/$FINAL_NAME"

              # Attempt 3: wget as last resort
              echo "🔄 Attempt 3/3 — wget..."
              if wget -q --show-progress \
                    --timeout=7200 \
                    --tries=5 \
                    --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                    --referer="https://t.me/" \
                    -O "tmp_downloads/$FINAL_NAME" \
                    "$URL"; then
                DOWNLOAD_OK=true
              else
                echo "❌ All 3 download methods failed"
              fi
            fi
          fi

          if [ "$DOWNLOAD_OK" = false ] || [ ! -f "tmp_downloads/$FINAL_NAME" ]; then
            echo "❌ Download failed after all attempts"
            exit 1
          fi

          SIZE=$(stat -c%s "tmp_downloads/$FINAL_NAME")

          if [ "$SIZE" -lt 1024 ]; then
            echo "❌ ERROR: File too small (${SIZE} bytes) — likely an error page"
            head -5 "tmp_downloads/$FINAL_NAME"
            rm "tmp_downloads/$FINAL_NAME"
            exit 1
          fi

          SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
          echo ""
          echo "✅ Download complete!"
          echo "   📄 File : $FINAL_NAME"
          echo "   💾 Size : ${SIZE_MB} MB"

          echo "file_size=$SIZE"             >> $GITHUB_OUTPUT
          echo "file_size_mb=$SIZE_MB"       >> $GITHUB_OUTPUT
          echo "downloaded_name=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: 📦 Package & organise into folder
        run: |
          FILENAME="${{ steps.download.outputs.downloaded_name }}"
          FILE_SIZE="${{ steps.download.outputs.file_size }}"
          FILE_SIZE_MB="${{ steps.download.outputs.file_size_mb }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          TELEGRAM_LINK="${{ github.event.inputs.telegram_link }}"

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          FILE_SIZE_MB_INT=$(echo "$FILE_SIZE_MB" | cut -d'.' -f1)

          if   [ "$FILE_SIZE_MB_INT" -lt 45 ]; then
            SPLIT_MB=0
          elif [ "$FILE_SIZE_MB_INT" -lt 500 ]; then
            SPLIT_MB=45
          elif [ "$FILE_SIZE_MB_INT" -lt 2048 ]; then
            SPLIT_MB=90
          else
            SPLIT_MB=190
          fi

          SPLIT_LIMIT=$(( SPLIT_MB * 1024 * 1024 ))

          echo "═══════════════════════════════════════════════════════════════"
          echo "📊 Smart split decision:"
          echo "   💾 File size  : ${FILE_SIZE_MB} MB"
          if [ "$SPLIT_MB" -eq 0 ]; then
            echo "   ✂️  Split      : not needed — file fits GitHub limits"
          else
            echo "   ✂️  Split size : ${SPLIT_MB} MB per part (auto-selected)"
          fi
          echo "═══════════════════════════════════════════════════════════════"

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta"
                        "kappa" "lambda" "sigma" "omega" "nova" "star" "moon"
                        "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"; return
            fi
            local RAND="${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
            while [ -d "$BASE_PATH/${NAME}_${RAND}" ] || [ -d "$BACKUP_DIR/${NAME}_${RAND}" ]; do
              RAND="${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
            done
            echo "${NAME}_${RAND}"
          }

          FILENAME_NO_EXT="${FILENAME%.*}"
          EXT="${FILENAME##*.}"
          [ "$EXT" = "$FILENAME" ] && EXT="bin"

          FINAL_FOLDER=$(get_unique_folder "downloads" "$FILENAME_NO_EXT")
          FOLDER_DIR="$BACKUP_DIR/$FINAL_FOLDER"
          mkdir -p "$FOLDER_DIR"
          FOLDER_ENCODED=$(urlencode "$FINAL_FOLDER")

          echo "📁 Target folder : $FINAL_FOLDER"

          # ─── Branch A: split archive ─────────────────────────────────────
          if [ "$SPLIT_MB" -gt 0 ] && [ "$FILE_SIZE" -gt "$SPLIT_LIMIT" ]; then

            echo "✂️  Creating split 7z archive (${SPLIT_MB} MB parts)..."
            ARCHIVE_BASE="$FOLDER_DIR/$FINAL_FOLDER"

            if [ -n "$ZIP_PASSWORD" ]; then
              7z a -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mhe=on -mx=0 \
                "${ARCHIVE_BASE}.7z" "tmp_downloads/$FILENAME"
            else
              7z a -v${SPLIT_MB}m -mx=0 \
                "${ARCHIVE_BASE}.7z" "tmp_downloads/$FILENAME"
            fi

            PART_COUNT=$(ls "$FOLDER_DIR/"*.7z* 2>/dev/null | wc -l)
            echo "   ✅ Created $PART_COUNT parts"

            TOTAL_ARC_SIZE=0
            for pf in "$FOLDER_DIR"/*; do
              [ -f "$pf" ] || continue
              TOTAL_ARC_SIZE=$(( TOTAL_ARC_SIZE + $(stat -c%s "$pf") ))
            done
            TOTAL_ARC_MB=$(echo "scale=2; $TOTAL_ARC_SIZE / 1024 / 1024" | bc)

            DOWNLOAD_LINKS_MD=""
            LINK_NUM=0
            for pf in $(ls "$FOLDER_DIR/"*.7z* 2>/dev/null | sort); do
              [ -f "$pf" ] || continue
              PB=$(basename "$pf")
              PE=$(urlencode "$PB")
              RAW="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PE}"
              LINK_NUM=$(( LINK_NUM + 1 ))
              DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PB}\` | [⬇️ Download](${RAW}) |"$'\n'
            done

            cat > "$FOLDER_DIR/README.md" << 'READMEEOF'
          # PLACEHOLDER
          READMEEOF

            {
              printf '# %s\n\n' "$FINAL_FOLDER"
              printf -- '---\n\n'
              printf '## 📋 File Information\n\n'
              printf '| Property | Value |\n'
              printf '|----------|-------|\n'
              printf '| **File Name** | `%s` |\n' "$FILENAME_NO_EXT"
              printf '| **Source Link** | [Telegram Post](%s) |\n' "$TELEGRAM_LINK"
              printf '| **Original Size** | **%s MB** |\n' "$FILE_SIZE_MB"
              printf '| **Archive** | **%s parts — %s MB total** |\n' "$PART_COUNT" "$TOTAL_ARC_MB"
              printf '| **Part Size** | **%s MB per part** (auto-selected) |\n' "$SPLIT_MB"
              printf '| **Status** | ✅ Complete |\n'
              if [ -n "$ZIP_PASSWORD" ]; then
                printf '| **Password Protected** | 🔐 **YES** |\n'
              else
                printf '| **Password Protected** | **NO** |\n'
              fi
              printf '\n---\n\n'
              printf '## ⬇️ Download Links\n\n'
              printf '| # | File | Link |\n'
              printf '|---|------|------|\n'
              printf '%s' "$DOWNLOAD_LINKS_MD"
              printf '\n---\n\n'
              printf '## 📖 How to Extract\n\n'
              printf '1. **Download** all parts (`.7z.001`, `.7z.002`, ...)\n'
              printf '2. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) or [Keka](https://www.keka.io/) (Mac)\n'
              printf '3. **Right-click** the `.7z.001` file → **Extract Here**\n'
              printf '4. All parts combine automatically into the original file\n'
              [ -n "$ZIP_PASSWORD" ] && printf '5. **Enter the password** when prompted\n'
              printf '\n---\n\n'
              printf '*Downloaded via GitHub Actions Telegram Downloader*\n'
            } > "$FOLDER_DIR/README.md"

          # ─── Branch B: small file + password → single 7z ─────────────────
          elif [ -n "$ZIP_PASSWORD" ]; then

            echo "🔐 Creating password-protected 7z archive..."
            7z a -p"${ZIP_PASSWORD}" -mhe=on -mx=0 \
              "$FOLDER_DIR/${FINAL_FOLDER}.7z" "tmp_downloads/$FILENAME"

            ARC_SIZE=$(stat -c%s "$FOLDER_DIR/${FINAL_FOLDER}.7z" 2>/dev/null || echo 0)
            ARC_MB=$(echo "scale=2; $ARC_SIZE / 1024 / 1024" | bc)
            FILE_ENC=$(urlencode "${FINAL_FOLDER}.7z")
            RAW="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENC}"

            {
              printf '# %s\n\n' "$FINAL_FOLDER"
              printf -- '---\n\n'
              printf '## 📋 File Information\n\n'
              printf '| Property | Value |\n'
              printf '|----------|-------|\n'
              printf '| **File Name** | `%s` |\n' "$FILENAME_NO_EXT"
              printf '| **Source Link** | [Telegram Post](%s) |\n' "$TELEGRAM_LINK"
              printf '| **Original Size** | **%s MB** |\n' "$FILE_SIZE_MB"
              printf '| **Archive Size** | **%s MB** |\n' "$ARC_MB"
              printf '| **Status** | ✅ Complete |\n'
              printf '| **Password Protected** | 🔐 **YES** |\n'
              printf '\n---\n\n'
              printf '## ⬇️ Download Link\n\n'
              printf '| # | File | Link |\n'
              printf '|---|------|------|\n'
              printf '| 1 | `%s.7z` | [⬇️ Download](%s) |\n' "$FINAL_FOLDER" "$RAW"
              printf '\n---\n\n'
              printf '## 📖 How to Extract\n\n'
              printf '1. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) or [Keka](https://www.keka.io/) (Mac)\n'
              printf '2. **Right-click** the `.7z` file → **Extract Here**\n'
              printf '3. **Enter the password** when prompted\n'
              printf '\n---\n\n'
              printf '*Downloaded via GitHub Actions Telegram Downloader*\n'
            } > "$FOLDER_DIR/README.md"

          # ─── Branch C: small file, no password → store as-is ─────────────
          else

            echo "📄 File fits without splitting — storing directly..."
            cp "tmp_downloads/$FILENAME" "$FOLDER_DIR/${FINAL_FOLDER}.${EXT}"

            FILE_ENC=$(urlencode "${FINAL_FOLDER}.${EXT}")
            RAW="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENC}"

            {
              printf '# %s\n\n' "$FINAL_FOLDER"
              printf -- '---\n\n'
              printf '## 📋 File Information\n\n'
              printf '| Property | Value |\n'
              printf '|----------|-------|\n'
              printf '| **File Name** | `%s` |\n' "$FILENAME_NO_EXT"
              printf '| **Source Link** | [Telegram Post](%s) |\n' "$TELEGRAM_LINK"
              printf '| **Size** | **%s MB** (single file — no split needed) |\n' "$FILE_SIZE_MB"
              printf '| **Status** | ✅ Complete |\n'
              printf '| **Password Protected** | **NO** |\n'
              printf '\n---\n\n'
              printf '## ⬇️ Download Link\n\n'
              printf '| # | File | Link |\n'
              printf '|---|------|------|\n'
              printf '| 1 | `%s.%s` | [⬇️ Download](%s) |\n' "$FINAL_FOLDER" "$EXT" "$RAW"
              printf '\n---\n\n'
              printf 'Ready to use — no extraction needed!\n'
              printf '\n---\n\n'
              printf '*Downloaded via GitHub Actions Telegram Downloader*\n'
            } > "$FOLDER_DIR/README.md"

          fi

          rm -rf tmp_downloads

          echo ""
          echo "✅ Package ready:"
          find "$FOLDER_DIR" -type f | sort

          echo "folder_name=$FINAL_FOLDER" >> $GITHUB_ENV

      - name: 📤 Incremental commit & push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)

          regenerate_master_readme() {
            MASTER_README="downloads/README.md"
            mkdir -p downloads

            {
              printf '# 📲 Telegram Downloaded Files\n\n'
              printf -- '---\n\n'
            } > "$MASTER_README"

            FILE_EMOJIS=("📁" "📂" "🗂️" "📦" "🗃️" "💾" "📎" "🔗" "📋" "🗄️"
                         "🎬" "🎥" "🎵" "🎶" "📸" "🖼️" "📄" "📑" "📃" "🗒️")
            NUM=0
            for folder in downloads/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              NUM=$(( NUM + 1 ))
              EMOJI="${FILE_EMOJIS[$RANDOM % ${#FILE_EMOJIS[@]}]}"
              FENC=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$FOLDER_NAME")
              LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/downloads/${FENC}"
              printf -- '- %d %s [%s](%s)\n' "$NUM" "$EMOJI" "$FOLDER_NAME" "$LINK" >> "$MASTER_README"
            done

            printf '\n---\n\n*Auto-generated by GitHub Actions Telegram Downloader*\n' >> "$MASTER_README"
            echo "📋 Master README updated — $NUM folder(s) listed"
          }

          push_single_file() {
            local FILE_PATH="$1"
            local MAX_RETRIES=5
            local RETRY=0
            while [ $RETRY -lt $MAX_RETRIES ]; do
              RETRY=$(( RETRY + 1 ))
              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              LOCAL_HEAD=$(git rev-parse HEAD 2>/dev/null || echo "none")
              REMOTE_HEAD=$(git rev-parse origin/"$BRANCH" 2>/dev/null || echo "none")
              if [ "$LOCAL_HEAD" != "$REMOTE_HEAD" ] && [ "$REMOTE_HEAD" != "none" ]; then
                git reset --hard origin/"$BRANCH" 2>/dev/null || true
                mkdir -p downloads
                cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
              fi
              git add "$FILE_PATH" 2>/dev/null || true
              if git diff --cached --quiet 2>/dev/null; then
                echo "    ⏭️  Already uploaded: $FILE_PATH"
                return 0
              fi
              FNAME=$(basename "$FILE_PATH")
              git commit -m "📲 Add: $FNAME [skip ci]" --quiet 2>/dev/null || true
              echo "    🚀 Push attempt $RETRY/$MAX_RETRIES..."
              if timeout 120 git push origin HEAD:"$BRANCH" 2>&1; then
                echo "    ✅ Success!"
                return 0
              else
                echo "    ⚠️  Failed, retrying..."
                sleep $(( 2 + RANDOM % 5 ))
              fi
            done
            echo "    ❌ WARNING: Could not push $FILE_PATH after $MAX_RETRIES attempts"
            return 1
          }

          push_batch() {
            local BATCH_SIZE=3
            local FILES=("$@")
            local BATCH_COUNT=0
            local BATCH_FILES=()
            local TOTAL_PUSHED=0
            local TOTAL_FILES=${#FILES[@]}

            for FILE in "${FILES[@]}"; do
              BATCH_FILES+=("$FILE")
              BATCH_COUNT=$(( BATCH_COUNT + 1 ))

              if [ $BATCH_COUNT -ge $BATCH_SIZE ]; then
                TOTAL_PUSHED=$(( TOTAL_PUSHED + BATCH_COUNT ))
                echo ""
                echo ">>> 📦 Pushing batch ($TOTAL_PUSHED / $TOTAL_FILES files)..."

                git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                git reset --hard origin/"$BRANCH" 2>/dev/null || true
                mkdir -p downloads
                cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

                for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done

                if ! git diff --cached --quiet 2>/dev/null; then
                  git commit -m "📲 Add batch of $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true
                  local PR=0; local PS=false
                  while [ $PR -lt 5 ]; do
                    PR=$(( PR + 1 ))
                    if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                      PS=true; echo "    ✅ Batch pushed!"; break
                    else
                      echo "    ⚠️  Retry $PR/5..."
                      git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                      git reset --hard origin/"$BRANCH" 2>/dev/null || true
                      mkdir -p downloads
                      cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                      for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done
                      if ! git diff --cached --quiet 2>/dev/null; then
                        git commit -m "📲 Add batch of $BATCH_COUNT files [skip ci]" --quiet 2>/dev/null || true
                      fi
                      sleep $(( 3 + RANDOM % 7 ))
                    fi
                  done
                  if [ "$PS" = false ]; then
                    echo "    ⚠️  Batch failed — pushing individually..."
                    for BF in "${BATCH_FILES[@]}"; do push_single_file "$BF"; done
                  fi
                fi

                BATCH_FILES=(); BATCH_COUNT=0; sleep 2
              fi
            done

            # Push any remaining files in the last incomplete batch
            if [ ${#BATCH_FILES[@]} -gt 0 ]; then
              TOTAL_PUSHED=$(( TOTAL_PUSHED + ${#BATCH_FILES[@]} ))
              echo ""
              echo ">>> 📦 Pushing final batch ($TOTAL_PUSHED / $TOTAL_FILES files)..."
              git fetch origin "$BRANCH" --quiet 2>/dev/null || true
              git reset --hard origin/"$BRANCH" 2>/dev/null || true
              mkdir -p downloads
              cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
              for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done
              if ! git diff --cached --quiet 2>/dev/null; then
                git commit -m "📲 Add final batch [skip ci]" --quiet 2>/dev/null || true
                local PR=0
                while [ $PR -lt 5 ]; do
                  PR=$(( PR + 1 ))
                  if timeout 180 git push origin HEAD:"$BRANCH" 2>&1; then
                    echo "    ✅ Final batch pushed!"; break
                  else
                    echo "    ⚠️  Retry $PR/5..."
                    sleep $(( 3 + RANDOM % 7 ))
                    git fetch origin "$BRANCH" --quiet 2>/dev/null || true
                    git reset --hard origin/"$BRANCH" 2>/dev/null || true
                    mkdir -p downloads
                    cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
                    for BF in "${BATCH_FILES[@]}"; do git add "$BF" 2>/dev/null || true; done
                    if ! git diff --cached --quiet 2>/dev/null; then
                      git commit -m "📲 Add final batch [skip ci]" --quiet 2>/dev/null || true
                    fi
                  fi
                done
              fi
            fi
          }

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "🚀 Starting incremental push..."
          echo "═══════════════════════════════════════════════════════════════"

          echo "🔄 Syncing with remote..."
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          mkdir -p downloads
          cp -r "$BACKUP_DIR"/* downloads/

          echo "🔍 Scanning files..."
          ALL_FILES=()

          # READMEs first (small, aid navigation)
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -name "README.md" -print0 2>/dev/null)

          # Then all data files
          while IFS= read -r -d '' FILE; do
            ALL_FILES+=("$FILE")
          done < <(find downloads -type f ! -name "README.md" -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "📦 Files found: $TOTAL_FILES"

          if [ $TOTAL_FILES -eq 0 ]; then
            echo "⚠️  No files to push!"
            exit 0
          fi

          TOTAL_SIZE=0
          for F in "${ALL_FILES[@]}"; do
            [ -f "$F" ] || continue
            FS=$(stat -c%s "$F" 2>/dev/null || echo 0)
            TOTAL_SIZE=$(( TOTAL_SIZE + FS ))
          done
          TOTAL_SIZE_MB=$(( TOTAL_SIZE / 1024 / 1024 ))
          echo "💾 Total size  : ${TOTAL_SIZE_MB} MB"
          echo ""

          if [ $TOTAL_SIZE_MB -lt 100 ]; then
            echo "📤 Small upload — pushing all at once..."

            git add -A downloads/
            regenerate_master_readme
            git add downloads/README.md

            if ! git diff --cached --quiet; then
              git commit -m "📲 Telegram download [skip ci]"
              PR=0
              while [ $PR -lt 10 ]; do
                PR=$(( PR + 1 ))
                if timeout 300 git push origin HEAD:"$BRANCH"; then
                  echo "✅ Push successful!"; break
                else
                  echo "⚠️  Push failed, retry $PR/10..."
                  sleep $(( 3 + RANDOM % 7 ))
                  git fetch origin "$BRANCH"
                  git reset --hard origin/"$BRANCH"
                  mkdir -p downloads
                  cp -r "$BACKUP_DIR"/* downloads/
                  git add -A downloads/
                  regenerate_master_readme
                  git add downloads/README.md
                  if ! git diff --cached --quiet; then
                    git commit -m "📲 Telegram download [skip ci]"
                  fi
                fi
              done
            fi

          else
            echo "📤 Large upload (${TOTAL_SIZE_MB}MB) — incremental batch push..."
            push_batch "${ALL_FILES[@]}"

            echo ""
            echo "📋 Updating master README..."
            git fetch origin "$BRANCH" --quiet 2>/dev/null || true
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
            mkdir -p downloads
            cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true

            regenerate_master_readme
            git add downloads/README.md

            if ! git diff --cached --quiet 2>/dev/null; then
              git commit -m "📋 Update Telegram downloads list [skip ci]" --quiet 2>/dev/null || true
              PR=0
              while [ $PR -lt 5 ]; do
                PR=$(( PR + 1 ))
                if timeout 60 git push origin HEAD:"$BRANCH" 2>&1; then
                  echo "✅ Master README pushed!"; break
                else
                  echo "⚠️  Retry $PR/5..."
                  sleep 3
                fi
              done
            fi
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "🎉 All done! Files are in: downloads/${{ env.folder_name }}/"
          echo "═══════════════════════════════════════════════════════════════"

      - name: 📋 Final report
        if: always()
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│              📲 Telegram Downloader — Final Report          │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ 🔗 Source  : ${{ github.event.inputs.telegram_link }}"
          echo "│ 📁 Folder  : downloads/${{ env.folder_name }}/"
          if [ -n "${{ github.event.inputs.password }}" ]; then
            echo "│ 🔐 Archive : Password-protected"
          else
            echo "│ 🔓 Archive : No password"
          fi
          echo "└─────────────────────────────────────────────────────────────┘"
